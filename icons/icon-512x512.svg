<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
        <defs>
            <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#10b981" /> <!-- Emerald-500 -->
                <stop offset="100%" stop-color="#047857" /> <!-- Emerald-700 -->
            </linearGradient>
            <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
                <feDropShadow dx="0" dy="25.6" stdDeviation="15.36" flood-color="#000000" flood-opacity="0.3"/>
            </filter>
        </defs>
        
        <!-- Tile Background -->
        <rect x="25.6" y="25.6" width="460.8" height="460.8" rx="76.8" ry="76.8" fill="url(#bgGradient)" filter="url(#shadow)" />
        
        <!-- Inner Border (Tile inset effect) -->
        <rect x="51.2" y="51.2" width="409.6" height="409.6" rx="51.2" ry="51.2" fill="none" stroke="#34d399" stroke-width="10.24" />

        <!-- Center Text '發' -->
        <text x="50%" y="358" font-family="sans-serif" font-weight="900" font-size="307px" fill="#ffffff" text-anchor="middle">發</text>
    </svg>