<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
        <defs>
            <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#10b981" /> <!-- Emerald-500 -->
                <stop offset="100%" stop-color="#047857" /> <!-- Emerald-700 -->
            </linearGradient>
            <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
                <feDropShadow dx="0" dy="9" stdDeviation="5.3999999999999995" flood-color="#000000" flood-opacity="0.3"/>
            </filter>
        </defs>
        
        <!-- Tile Background -->
        <rect x="9" y="9" width="162" height="162" rx="27" ry="27" fill="url(#bgGradient)" filter="url(#shadow)" />
        
        <!-- Inner Border (Tile inset effect) -->
        <rect x="18" y="18" width="144" height="144" rx="18" ry="18" fill="none" stroke="#34d399" stroke-width="3.6" />

        <!-- Center Text '發' -->
        <text x="50%" y="125" font-family="sans-serif" font-weight="900" font-size="108px" fill="#ffffff" text-anchor="middle">發</text>
    </svg>