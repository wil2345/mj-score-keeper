<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Score Keeper</title>
    
    <!-- PWA Manifest & App Info -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.svg">
    
    <script src="libs/tailwindcss.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="libs/chart.js"></script>
    <script src="libs/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">

    <!-- Register Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(
                    registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                        
                        // Check for updates every time the page loads
                        registration.update();

                        // Listen for a new service worker installing
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            if (newWorker) {
                                newWorker.addEventListener('statechange', () => {
                                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                        // A new version is available! Automatically activate it.
                                        newWorker.postMessage({ type: 'SKIP_WAITING' });
                                    }
                                });
                            }
                        });
                    },
                    err => {
                        console.log('ServiceWorker registration failed: ', err);
                    }
                );

                let refreshing;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (refreshing) return;
                    refreshing = true;
                    window.location.reload();
                });
            });
        }
    </script>
</head>
<body class="bg-gray-200 text-gray-800 transition-colors duration-200 dark:bg-gray-900 dark:text-gray-100">

    <div id="app" class="container mx-auto p-4">
        <!-- Main application content will be dynamically rendered here -->
    </div>

    <script src="libs/idb-keyval.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
